        - article [ref=e110]:
          - paragraph [ref=e111]: FAQ
          - heading "SBTI 是什么？" [level=3] [ref=e112]
          - paragraph [ref=e113]: SBTI 是一个轻松向的人格测试。它不用一堆术语去定义你，而是从自我认知、感情投入、行动方式和社交边界这些日常状态出发，帮你看见自己更像哪一种人格。
        - article [ref=e114]:
          - paragraph [ref=e115]: FAQ
          - heading "SBTI 和 MBTI 有什么区别？" [level=3] [ref=e116]
          - paragraph [ref=e117]: MBTI 更像一套经典人格分类工具，SBTI 则更贴近中文互联网语境里的表达方式。你在这里测到的，不是一本正经的标签，而是更接近日常行为和真实反应的一面。
        - article [ref=e118]:
          - paragraph [ref=e119]: FAQ
          - heading "SBTI 人格测试会测什么？" [level=3] [ref=e120]
          - paragraph [ref=e121]: 整套测试分成五组切面：自我模型、情感模型、态度模型、行动驱力模型和社交模型。测完之后，可以看到十五维落点和最终人格结果。
        - article [ref=e122]:
          - paragraph [ref=e123]: FAQ
          - heading "测完 SBTI 之后能看到什么？" [level=3] [ref=e124]
          - paragraph [ref=e125]: 你会拿到一个专属结果页，里面有人格名称、人格解读、十五维落点，以及其他人格类型的详情页入口，方便继续对照和分享。
